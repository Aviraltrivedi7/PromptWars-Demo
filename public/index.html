<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <meta name="theme-color" content="#080c14"/>
  <title>StadiumSense — AI Smart Venue</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #020617;
      --bg-alt: #0f172a;
      --card: rgba(30, 41, 59, 0.5);
      --glass: rgba(15, 23, 42, 0.7);
      --glass-border: rgba(255, 255, 255, 0.1);
      
      --accent: #22d3ee;
      --accent-glow: rgba(34, 211, 238, 0.3);
      --secondary: #a855f7;
      --secondary-glow: rgba(168, 85, 247, 0.3);
      
      --green: #4ade80;
      --red: #f87171;
      --yellow: #fbbf24;
      --orange: #fb923c;
      
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --text-dim: #64748b;
      
      --font-display: 'Bebas Neue', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      
      --r-xs: 8px;
      --r-sm: 12px;
      --r-md: 20px;
      --r-lg: 28px;
      --r-xl: 40px;
      
      --shadow-sm: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      --shadow-md: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
      --shadow-lg: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
      --shadow-glow: 0 0 20px var(--accent-glow);
    }
    
    html {
      scroll-behavior: smooth;
      background: var(--bg);
    }
    
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
      margin: 0;
    }
    
    #root {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .glass-card {
      background: var(--glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: var(--r-md);
    }

    .text-gradient {
      background: linear-gradient(135deg, #fff 30%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    ::-webkit-scrollbar {
      width: 4px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--accent);
      border-radius: 10px;
    }
    
    ::selection {
      background: var(--accent-glow);
      color: #fff;
    }

    button {
      font-family: var(--font-body);
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
    }
    
    button:active {
      transform: scale(0.95);
    }

  </style>
</head>
<body>
  <div id="root"></div>
</body>
</html>
